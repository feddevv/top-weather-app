<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <main class="weather-layout">
      <div class="search-container">
        <input
          type="search"
          name="search"
          id="search"
          placeholder="Enter the city"
        />

        <button class="search-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>

      <section class="weather-card" aria-label="Current weather">
        <header class="weather-card-header">
          <p class="weather-card-label">Current weather</p>
          <p class="weather-card-date"></p>
        </header>

        <div class="weather-card-headline">
          <img src="" class="weather-card-icon" alt="Weather icon" />
          <h1 class="weather-card-city">N/A</h1>

          <label class="switch">
            <input type="checkbox" name="convert" id="convert" />
            <span class="slider"> <span>°C</span><span>°F</span> </span>
          </label>
        </div>

        <div class="weather-main">
          <p class="weather-main-temp">N/A</p>
          <div class="weather-main-status">
            <p class="weather-main-condition">N/A</p>
            <p class="weather-main-feels">N/A</p>
          </div>
        </div>

        <div class="weather-divider" aria-hidden="true"></div>

        <section class="weather-stats" aria-label="Weather details">
          <article class="stat-item">
            <p class="stat-item-label">Wind</p>
            <p class="stat-item-value wind">N/A</p>
          </article>
          <article class="stat-item">
            <p class="stat-item-label">Humidity</p>
            <p class="stat-item-value humidity">N/A</p>
          </article>
          <article class="stat-item">
            <p class="stat-item-label">Pressure</p>
            <p class="stat-item-value pressure">N/A</p>
          </article>
        </section>

        <div class="loader-wrapper hidden">
          <div class="loader"></div>
        </div>
      </section>
    </main>
  </body>
</html>
